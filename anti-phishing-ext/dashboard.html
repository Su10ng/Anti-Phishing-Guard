<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anti-Phishing Guard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="container">

    <header class="dash-header">
      <h1>🛡️ Anti-Phishing Guard</h1>
      <p id="dash-subtitle">…</p>
    </header>

    <!-- Algorithm settings -->
    <section class="card">
      <h2 id="section-algorithms">…</h2>

      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label" id="hg-label">…</span>
          <span class="setting-desc"  id="hg-desc">…</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="check-homographs">
          <span class="toggle-track"></span>
        </label>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label" id="age-check-label">…</span>
          <span class="setting-desc"  id="age-check-desc">…</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="check-age">
          <span class="toggle-track"></span>
        </label>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label" id="age-thresh-label">…</span>
          <span class="setting-desc"  id="age-thresh-desc">…</span>
        </div>
        <div class="age-input-wrap">
          <input type="number" id="age-threshold" min="1" max="3650" value="30" class="age-input">
          <span class="age-unit" id="age-thresh-unit">…</span>
        </div>
      </div>
    </section>

    <!-- Toast / notification settings -->
    <section class="card">
      <h2 id="section-notifications">…</h2>

      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label" id="toast-on-label">…</span>
          <span class="setting-desc"  id="toast-on-desc">…</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toast-enabled">
          <span class="toggle-track"></span>
        </label>
      </div>

      <div class="setting-row" id="row-toast-dur">
        <div class="setting-info">
          <span class="setting-label" id="toast-dur-label">…</span>
        </div>
        <div class="age-input-wrap">
          <input type="number" id="toast-duration" min="2" max="60" value="10" class="age-input">
          <span class="age-unit" id="toast-dur-unit">…</span>
        </div>
      </div>

      <div class="setting-row" id="row-toast-pos">
        <div class="setting-info">
          <span class="setting-label" id="toast-pos-label">…</span>
        </div>
        <select id="toast-position" class="pos-select">
          <option value="top-right"    id="pos-tr">…</option>
          <option value="top-left"     id="pos-tl">…</option>
          <option value="bottom-right" id="pos-br">…</option>
          <option value="bottom-left"  id="pos-bl">…</option>
        </select>
      </div>
    </section>

    <!-- Lists (open modals) -->
    <section class="card">
      <h2 id="sec-lists">…</h2>
      <div class="list-open-row">
        <button class="btn-open-list" id="open-whitelist">…</button>
        <button class="btn-open-list btn-open-red" id="open-blacklist">…</button>
      </div>
    </section>

    <!-- Statistics -->
    <section class="card">
      <h2 id="sec-stats">…</h2>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-value" id="stat-checked-val">—</div>
          <div class="stat-label" id="stat-checked-label">…</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-blocked-val">—</div>
          <div class="stat-label" id="stat-blocked-label">…</div>
        </div>
      </div>
    </section>

    <!-- Export / Import -->
    <section class="card">
      <h2 id="sec-data">…</h2>
      <div class="data-actions">
        <button class="btn-add" id="btn-export">…</button>
        <button class="btn-add" id="btn-import">…</button>
        <input type="file" id="import-file" accept=".json" hidden>
      </div>
    </section>

  </div>

  <!-- ── Whitelist modal ──────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-whitelist" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <button class="modal-back" id="modal-whitelist-back">…</button>
        <h2 id="modal-whitelist-title">…</h2>
        <button class="btn-add btn-clear" id="whitelist-clear">…</button>
      </div>
      <div class="list-add">
        <input type="text" id="whitelist-input" placeholder="example.com" class="domain-input" autocomplete="off" spellcheck="false">
        <button class="btn-add" id="whitelist-add">…</button>
      </div>
      <div id="whitelist-items" class="list-items"></div>
    </div>
  </div>

  <!-- ── Blacklist modal ──────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-blacklist" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <button class="modal-back" id="modal-blacklist-back">…</button>
        <h2 id="modal-blacklist-title">…</h2>
        <button class="btn-add btn-add-red btn-clear" id="blacklist-clear">…</button>
      </div>
      <div class="list-add">
        <input type="text" id="blacklist-input" placeholder="example.com" class="domain-input" autocomplete="off" spellcheck="false">
        <button class="btn-add btn-add-red" id="blacklist-add">…</button>
      </div>
      <div id="blacklist-items" class="list-items"></div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
